services:
 
  grafana:
    image: grafana/grafana:11.1.0
    container_name: grafana
    restart: always
    depends_on:
      - postgres
    environment:
      GF_SECURITY_ADMIN_PASSWORD: ${GF_SECURITY_ADMIN_PASSWORD}
    volumes:
      - grafana_data:/var/lib/grafana 
    ports:
      - "3000:3000"  
    networks:
      - meshtastic-net


  node_scripts:
    image: node:18
    working_dir: /usr/src/app
    volumes:
      - ./node_scripts:/usr/src/app
      - /usr/src/app/node_modules
    command:  sh -c "npm install && npm start"
    depends_on:
      - postgres
      - mosquitto
    environment:
      MQTT_URL: "mqtt://mosquitto:1883"
      MQTT_USER: ${MQTT_USER}
      MQTT_PASS: ${MQTT_PASS}
      PG_HOST: "postgres"
      PG_DB: "meshtastic"
      PG_USER: ${POSTGRES_USER}
      PG_PASS: ${POSTGRES_PASSWORD}
    networks:
      - meshtastic-net
    restart: always

  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: meshtastic
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - meshtastic-net

  mosquitto:
    image: eclipse-mosquitto:2
    ports:
      - "1883:1883"
      # - "9001:9001"
    environment:
      MQTT_USER: ${MQTT_USER}
      MQTT_PASS: ${MQTT_PASS}
    volumes:
      - ./mosquitto.conf:/mosquitto/config/mosquitto.conf:ro
      - mosquitto_data:/mosquitto/data
      - mosquitto_log:/mosquitto/log
    entrypoint: >
      sh -c '
      set -e

      mkdir -p /mosquitto/data
      chown -R mosquitto:mosquitto /mosquitto/data || true

      if [ ! -f /mosquitto/data/passwordfile ]; then
        echo "Creating MQTT user..."
        mosquitto_passwd -b -c /mosquitto/data/passwordfile "$MQTT_USER" "$MQTT_PASS"
        chown mosquitto:mosquitto /mosquitto/data/passwordfile || true
      fi

      exec mosquitto -c /mosquitto/config/mosquitto.conf
      '
    networks:
      - meshtastic-net
    restart: always

  # meshtastic-web:
  #   image: ghcr.io/meshtastic/web
  #   restart: unless-stopped
  #   ports:
  #     - "8082:8080"


volumes:
  postgres_data:
  mosquitto_data:
  mosquitto_log:
  grafana_data:

networks:
  meshtastic-net: